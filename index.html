<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Dalam Pembaruan</title>
    <!-- Memuat Matter.js untuk simulasi fisikanya -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <!-- Memuat Font Premium -->
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=600;800&family=Space+Grotesk:wght=500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0b0f19 0%, #131326 50%, #1e1135 100%);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body::before {
            content: '';
            position: absolute;
            top: 5%; left: 10%; width: 45%; height: 45%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: 5%; right: 10%; width: 45%; height: 45%;
            background: radial-gradient(circle, rgba(244, 63, 94, 0.08) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        #particle-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.006) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(255, 255, 255, 0.006) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 2;
            pointer-events: none;
        }

        .main-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .physics-node {
            position: absolute;
            background: rgba(13, 18, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 35px;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: center center;
            pointer-events: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: border-color 0.2s ease;
        }
        
        .physics-node.draggable {
            cursor: grab;
        }
        .physics-node.draggable:active {
            cursor: grabbing;
            border-color: rgba(168, 85, 247, 0.5);
        }

        #node-header {
            font-family: 'Clash Display', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: -0.5px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-radius: 999px;
            border-left: 4px solid #a855f7;
            border-right: 4px solid #fb7185;
            padding: 18px 45px;
        }
        #node-header .sub-status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: #cbd5e1;
            font-weight: 700;
        }
        #node-header span {
            background: linear-gradient(90deg, #c084fc, #fb7185);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #node-stats {
            display: flex;
            gap: 30px;
            font-size: 0.85rem;
            border-radius: 24px;
            border-top: 4px solid #3b82f6;
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .stat-label { color: #94a3b8; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; }
        .stat-val { 
            color: #38bdf8; 
            font-weight: 700; 
            font-family: 'JetBrains Mono', monospace;
        }

        #node-controls {
            background: rgba(15, 22, 38, 0.85);
            border-radius: 999px;
            padding: 10px 14px;
        }

        .btn-core {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f1f5f9;
            padding: 12px 30px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Clash Display', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            pointer-events: none;
        }
        .physics-node:hover .btn-core {
            border-color: #fb7185;
            background: rgba(255, 255, 255, 0.08);
        }
        #node-controls.active-mode .btn-core {
            background: #e11d48;
            color: white;
            border-color: #e11d48;
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.4);
        }

        #node-terminal {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #94a3b8;
            min-width: 380px;
            max-width: 90%;
            border-radius: 14px;
            border-left: 4px solid #10b981;
        }
        #node-terminal span { color: #c084fc; font-weight: bold; margin-right: 8px; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <div class="grid-overlay"></div>

    <div class="main-container" id="ui-container">
        
        <div class="physics-node" id="node-header">
            <div class="sub-status">🛰️ CORE SYSTEM</div>
            <div>WEBSITE SEDANG <span>MAINTENANCE/PEMBARUAN</span></div>
        </div>

        <div class="physics-node" id="node-stats">
            <div class="stat-item">
                <span class="stat-label">🔥 RENDER</span>
                <span class="stat-val" id="val-speed">98.4%</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">📡 LATENCY</span>
                <span class="stat-val" id="val-ping">12 ms</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⌛ PERKIRAAN SELESAI MAINTENANCE PADA PUKUL</span>
                <span class="stat-val">10:28 WIB</span>
            </div>
        </div>

        <div class="physics-node" id="node-controls" style="cursor: pointer;">
            <button class="btn-core" id="gravity-btn">🪐 GRAVITASI: OFF</button>
        </div>

        <div class="physics-node" id="node-terminal">
            <span>$</span> <div id="log-render">menghubungkan repositori lokal ke kluster produksi...</div>
        </div>

    </div>

    <script>
        /* =======================================================
           🪐 ENGINE FISIKA (MATTER.JS) - HYPER SPEED MODE
           ======================================================= */
        const { Engine, World, Bodies, Body, Mouse, MouseConstraint, Events } = Matter;
        const engine = Engine.create();
        
        engine.gravity.y = 0; 
        engine.gravity.x = 0;

        let useGravity = false;
        let physicsBodies = [];
        let mouseConstraint;

        let ground, leftWall, rightWall, ceiling;

        function initPhysicsWorld() {
            World.clear(engine.world);
            physicsBodies = [];
            
            const w = window.innerWidth;
            const h = window.innerHeight;

            ground = Bodies.rectangle(w / 2, h + 30, w * 2, 60, { isStatic: true });
            leftWall = Bodies.rectangle(-30, h / 2, 60, h * 2, { isStatic: true });
            rightWall = Bodies.rectangle(w + 30, h / 2, 60, h * 2, { isStatic: true });
            ceiling = Bodies.rectangle(w / 2, -30, w * 2, 60, { isStatic: true });
            
            World.add(engine.world, [ground, leftWall, rightWall, ceiling]);

            setupNodePhysics('node-header', w / 2, h / 2 - 160);
            setupNodePhysics('node-stats', w / 2, h / 2 - 40);
            setupNodePhysics('node-controls', w / 2, h / 2 + 70);
            setupNodePhysics('node-terminal', w / 2, h / 2 + 170);

            const mouse = Mouse.create(document.body);
            mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: {
                    stiffness: 0.4, // Dragging lebih responsif instan
                    render: { visible: false }
                }
            });
            World.add(engine.world, mouseConstraint);

            Events.on(mouseConstraint, 'mousedown', function(event) {
                const clickedBody = event.source.body;
                if (clickedBody && clickedBody.element && clickedBody.element.id === 'node-controls') {
                    toggleGravity();
                }
            });
        }

        function setupNodePhysics(elementId, startX, startY) {
            const el = document.getElementById(elementId);
            el.style.transform = 'none';
            const rect = el.getBoundingClientRect();
            
            el.style.left = `${startX - rect.width / 2}px`;
            el.style.top = `${startY - rect.height / 2}px`;

            // Gesekan udara di-nol-kan biar tidak menahan laju jatuh objek
            const body = Bodies.rectangle(startX, startY, rect.width, rect.height, {
                restitution: 0.6,     // Memantul keras bertenaga saat tabrakan dinding
                friction: 0.01,
                frictionAir: 0,       // TANPA hambatan udara, melesat bebas kilat
                isStatic: !useGravity
            });

            if(useGravity) el.classList.add('draggable');

            body.element = el;
            physicsBodies.push(body);
            World.add(engine.world, body);
        }

        function updatePhysicsLoop() {
            Engine.update(engine);

            physicsBodies.forEach(body => {
                if (!body.isStatic) {
                    body.element.style.left = `${body.position.x - body.element.offsetWidth / 2}px`;
                    body.element.style.top = `${body.position.y - body.element.offsetHeight / 2}px`;
                    body.element.style.transform = `rotate(${body.angle}rad)`;
                }
            });

            requestAnimationFrame(updatePhysicsLoop);
        }

        function toggleGravity() {
            useGravity = !useGravity;
            const btn = document.getElementById('gravity-btn');
            const containerBox = document.getElementById('node-controls');
            
            physicsBodies.forEach(body => {
                const el = body.element;
                if (useGravity) {
                    el.classList.add('draggable');
                } else {
                    el.classList.remove('draggable');
                }
            });
            
            if (useGravity) {
                containerBox.classList.add('active-mode');
                btn.innerText = "🪐 GRAVITASI: ON";
                
                // Menaikkan nilai gravitasi secara drastis ke 5.0 untuk bantingan instan
                engine.gravity.y = 5.0; 
                
                physicsBodies.forEach(body => {
                    Body.setStatic(body, false);
                });
                document.getElementById('log-render').innerText = "status: hiper-akselerasi aktif. respon fisik instan.";
            } else {
                containerBox.classList.remove('active-mode');
                btn.innerText = "🪐 GRAVITASI: OFF";
                engine.gravity.y = 0;
                engine.gravity.x = 0;

                physicsBodies.forEach(body => {
                    Body.setStatic(body, true);
                    body.element.style.transform = 'rotate(0deg)';
                });
                
                initPhysicsWorld();
                document.getElementById('log-render').innerText = "status: susunan modul dikembalikan rapi ke posisi awal.";
            }

            resetParticles();
        }

        // Kontrol Kemiringan HP / Shake - Dibuat super sensitif dan bantingannya agresif kilat
        window.addEventListener('deviceorientation', (event) => {
            if (!useGravity) return;
            let gamma = event.gamma; 
            let beta = event.beta;   
            // Pembagi diperkecil ekstrem ke 3 agar tilt langsung merespon sangat kencang
            engine.gravity.x = Math.min(Math.max(gamma / 3, -5.5), 5.5);
            engine.gravity.y = Math.min(Math.max(beta / 3, -5.5), 5.5);
        });

        /* =======================================================
           ✨ CANVAS PARTIKEL OTOMATIS BERUBAH GAYA (SINKRON)
           ======================================================= */
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            initPhysicsWorld();
            resetParticles();
        });

        class CyberParticle {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                
                if (useGravity) {
                    this.vx = (Math.random() - 0.5) * 6; // Partikel bergerak lebih liar melesat
                    this.vy = (Math.random() - 0.5) * 6;
                    this.style = Math.random() > 0.5 ? 'pixel' : 'ring';
                    this.size = this.style === 'pixel' ? Math.random() * 5 + 4 : Math.random() * 8 + 6;
                    this.opacity = Math.random() * 0.5 + 0.3;
                } else {
                    this.vx = (Math.random() - 0.5) * 0.6;
                    this.vy = (Math.random() - 0.5) * 0.6;
                    this.style = 'classic-dot';
                    this.size = Math.random() * 3 + 1.5;
                    this.opacity = Math.random() * 0.4 + 0.15;
                }
                
                this.angle = Math.random() * Math.PI;
                this.rotSpeed = (Math.random() - 0.5) * 0.1; // Rotasi lebih cepat
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.globalAlpha = this.opacity;

                if (this.style === 'pixel') {
                    ctx.rotate(this.angle);
                    ctx.fillStyle = '#c084fc';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#c084fc';
                    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                } else if (this.style === 'ring') {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.strokeStyle = '#fb7185';
                    ctx.lineWidth = 1.5;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#fb7185';
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = '#ffffff';
                    ctx.fill();
                }
                ctx.restore();
            }

            update() {
                if (useGravity) {
                    this.vx += (engine.gravity.x || 0) * 0.3;
                    this.vy += (engine.gravity.y || 5.0) * 0.3; 
                }
                
                this.x += this.vx;
                this.y += this.vy;
                this.angle += this.rotSpeed;

                if (useGravity) {
                    if (this.x < 5 || this.x > canvas.width - 5) this.vx *= -0.8;
                    if (this.y < 5 || this.y > canvas.height - 5) this.vy *= -0.8;
                    if (this.y > canvas.height - 15) {
                        this.y = canvas.height - 15;
                        this.vy *= -0.5; 
                        this.vx *= 0.92;
                    }
                } else {
                    if (this.x < 0) this.x = canvas.width;
                    if (this.x > canvas.width) this.x = 0;
                    if (this.y < 0) this.y = canvas.height;
                    if (this.y > canvas.height) this.y = 0;
                }
                
                this.draw();
            }
        }

        function resetParticles() {
            particlesArray = [];
            const count = useGravity ? 35 : 45;
            for(let i = 0; i < count; i++) {
                particlesArray.push(new CyberParticle());
            }
        }

        const maintenanceLogs = [
            "menyinkronkan berkas repositori lokal dengan server github...",
            "memperbarui UI tampilan website...",
            "menguji code slide hasil pembaruan...",
            "menyusun penataan skema tata letak antarmuka baru...",
            "proses build selesai setengah jalan. menunggu validasi akhir..."
        ];
        let logIndex = 0;
        setInterval(() => {
            if (!useGravity) {
                logIndex = (logIndex + 1) % maintenanceLogs.length;
                document.getElementById('log-render').innerText = maintenanceLogs[logIndex];
                
                document.getElementById('val-speed').innerText = (95 + Math.random() * 4).toFixed(1) + "%";
                document.getElementById('val-ping').innerText = Math.floor(10 + Math.random() * 15) + " ms";
            }
        }, 4000);

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(p => p.update());
            requestAnimationFrame(animateParticles);
        }

        resizeCanvas();
        initPhysicsWorld();
        resetParticles();
        updatePhysicsLoop();
        animateParticles();
    </script>
</body>
</html>
