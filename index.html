<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>✌️ Blur Effect</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous">
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b0b0b;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
    }
    .container {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 9 / 16;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
    }
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      /* mirror untuk selfie */
      filter: blur(0px);
      transition: filter 0.15s ease;
    }
    #status {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      color: #fff;
      padding: 12px 28px;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      z-index: 5;
    }
    #status .icon {
      font-size: 26px;
    }
    .blur-active #status {
      background: rgba(255, 70, 70, 0.25);
      border-color: rgba(255, 100, 100, 0.6);
      color: #ffb0b0;
    }
    .blur-active #status .icon {
      animation: pulse 0.6s infinite alternate;
    }
    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      100% {
        transform: scale(1.2);
      }
    }
    #hint {
      position: absolute;
      top: 30px;
      left: 0;
      width: 100%;
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
      pointer-events: none;
      z-index: 5;
    }
    @media (max-width: 480px) {
      .container {
        border-radius: 0;
        max-width: 100%;
      }
      #status {
        font-size: 15px;
        padding: 10px 20px;
        bottom: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <video id="video" playsinline></video>
    <div id="hint">✌️ tunjukkan 2 jari untuk Gendeng</div>
    <div id="status">
      <span class="icon">🤚</span>
      <span id="statusText">Tidak Blur</span>
    </div>
  </div>

  <script>
    // === Elemen ===
    const video = document.getElementById('video');
    const statusText = document.getElementById('statusText');
    const statusIcon = document.querySelector('#status .icon');
    const container = document.getElementById('container');

    let isBlurred = false;

    // === Inisialisasi MediaPipe Hands ===
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.5
    });

    // Deteksi ✌️ (peace sign)
    function isPeaceSign(landmarks) {
      if (!landmarks || landmarks.length < 21) return false;

      // Telunjuk (8) dan jari tengah (12) harus lebih tinggi dari sendi pangkal (6 & 10)
      const indexOpen = landmarks[8].y < landmarks[6].y;
      const middleOpen = landmarks[12].y < landmarks[10].y;
      // Jari manis (16) dan kelingking (20) harus menekuk (lebih rendah dari sendi pangkal)
      const ringClosed = landmarks[16].y > landmarks[14].y;
      const pinkyClosed = landmarks[20].y > landmarks[18].y;

      return indexOpen && middleOpen && ringClosed && pinkyClosed;
    }

    // === Hasil dari MediaPipe ===
    hands.onResults((results) => {
      // Cek apakah ada tangan dan deteksi gesture
      let detected = false;
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        if (isPeaceSign(landmarks)) {
          detected = true;
        }
      }

      // Terapkan blur ke video
      if (detected) {
        if (!isBlurred) {
          isBlurred = true;
          container.classList.add('blur-active');
          statusText.innerText = 'BLUR AKTIF 🔥';
          statusIcon.innerText = '✌️';
        }
        video.style.filter = 'blur(20px)';
      } else {
        if (isBlurred) {
          isBlurred = false;
          container.classList.remove('blur-active');
          statusText.innerText = 'Tidak Blur';
          statusIcon.innerText = '🤚';
        }
        video.style.filter = 'blur(0px)';
      }
    });

    // === Mulai Kamera dengan MediaPipe Camera Utility ===
    const camera = new Camera(video, {
      onFrame: async () => {
        await hands.send({ image: video });
      },
      width: 640,
      height: 480,
      facingMode: "user"
    });

    camera.start().then(() => {
      console.log('Kamera berhasil menyala');
    }).catch((err) => {
      console.error('Gagal akses kamera:', err);
      alert('Gagal akses kamera. Pastikan menggunakan HTTPS dan izinkan kamera.');
    });
  </script>
</body>
</html>
